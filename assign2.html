<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bootstrap Cards Grid</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-4">
<div class="row">
    <!-- Card 1 -->
    <div class="col-md-4">
    <div class="card">
        <img src="https://images.pexels.com/photos/414171/pexels-photo-414171.jpeg" class="card-img-top" alt="City">

        <div class="card-body">
        <h5 class="card-title">Card One</h5>
        <p class="card-text">This is a simple card with some text content.</p>
        <a href="#" class="btn btn-primary">Go somewhere</a>
        </div>
    </div>
    </div>

    <!-- Card 2 -->
    <div class="col-md-4">
    <div class="card">
        <img src="https://picsum.photos/300/200" class="card-img-top" alt="Random">

        <div class="card-body">
        <h5 class="card-title">Card Two</h5>
        <p class="card-text">Another card example with Bootstrap grid system.</p>
        <a href="#" class="btn btn-success">Learn more</a>
        </div>
    </div>
    </div>

    <!-- Card 3 -->
    <div class="col-md-4">
    <div class="card">
        <img src="https://picsum.photos/300/200" class="card-img-top" alt="Tech">

        <div class="card-body">
        <h5 class="card-title">Card Three</h5>
        <p class="card-text">Cards are responsive and stack on smaller screens.</p>
        <a href="#" class="btn btn-danger">Explore</a>
        </div>
    </div>
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
